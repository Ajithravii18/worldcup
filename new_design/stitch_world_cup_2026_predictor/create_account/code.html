<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant overflow-hidden relative z-10">
<!-- Header Image Area -->
<div class="h-48 relative w-full bg-surface-container flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center w-full h-full opacity-60" data-alt="A brightly lit, modern football stadium interior during daytime, focusing on clean architectural lines and pristine green pitch, shot from a low dynamic angle. Professional sports photography, sharp focus, vibrant natural light." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBSxeiGVP9Nk4RKVJ22wU3oZYL32IS5z0Zqu2Bdkqq8PQ-LZAaEgrQMNfNzEKJc6B797ZG1_MkkgXXl7TKEjODAh--Bp4GyXjvBUaL2XKr36g2fGVCKvFm8CFZbrchm8XjX7w2ugzsvKThvIKPjpYI1QUZGXHm8UjorA4YupMLp7UDXxSG29NBWg9Jsrj0fEcrV-uXWQLdW-WjiVB0k6eHJlxK-Mo0WIY_Zg1Ma6Qd2TF-Y8_vhzHozrq4XxhhrtT0ByEq7qFxJRV_w')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-surface-container-lowest to-transparent"></div>
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-display-lg text-primary mb-2" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
<h1 class="font-headline-lg md:font-headline-lg text-headline-lg md:text-headline-lg text-primary tracking-tighter uppercase">Lucky Star FC</h1>
</div>
</div>
<!-- Form Content -->
<div class="px-8 pb-10 pt-6">
<div class="mb-8 text-center">
<h2 class="font-headline-md text-headline-md text-on-surface mb-2">Join the Squad</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Create your account to access exclusive team stats and match day features.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Name Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface uppercase mb-1" for="fullName">Full Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface bg-surface-container-lowest border border-outline rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all placeholder:text-outline-variant" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface uppercase mb-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface bg-surface-container-lowest border border-outline rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="manager@luckystarfc.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface uppercase mb-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body-md text-body-md text-on-surface bg-surface-container-lowest border border-outline rounded-DEFAULT focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<p class="mt-2 font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">info</span> Must be at least 8 characters long.
                    </p>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded-DEFAULT shadow-sm font-label-md text-label-md uppercase text-on-tertiary-container bg-tertiary-container hover:bg-opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-tertiary-container transition-colors items-center gap-2 mt-8" type="submit">
                    SEND VERIFICATION CODE
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="mt-8 text-center border-t border-outline-variant pt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container uppercase transition-colors" href="#">Sign in</a>
</p>
</div>

<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-gradient-to-br from-primary-fixed to-transparent blur-[100px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-gradient-to-tl from-tertiary-fixed to-transparent blur-[100px]"></div>
</div>
